{% extends "base.html" %} {% block title %}Sign Up - SystemCore{% endblock %} {%
block content %}
<div class="row justify-content-center mt-5">
  <div class="col-lg-4 col-md-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title text-center mb-4">Register Account</h3>
        <form action="{{ url_for('auth.signup')}}" method="POST">
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
            />
          </div>

          <div class="mb-3">
            <label for="confirm_password" class="form-label">
              Re-enter Password
            </label>
            <input
              type="password"
              class="form-control"
              id="confirm_password"
              name="confirm_password"
              required
            />
          </div>

          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              Create Account
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
